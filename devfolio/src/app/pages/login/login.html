<!-- login.html -->
<main class="login-page">
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <span class="brand-dot"></span>
        DevFolio
      </div>
      <h1 class="login-title">Espace Admin</h1>
      <p class="login-subtitle">Connectez-vous pour acceder au back-office</p>
    </div>

    @if (erreur) {
      <div class="alert-error">
        Identifiants incorrects. Reessayez.
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="seConnecter()" novalidate>
      <div class="form-group">
        <label for="identifiant">Identifiant</label>
        <input
          id="identifiant"
          type="text"
          class="form-control"
          formControlName="identifiant"
          placeholder="admin"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="motDePasse">Mot de passe</label>
        <div class="input-wrap">
          <input
            id="motDePasse"
            [type]="voirMdp ? 'text' : 'password'"
            class="form-control"
            formControlName="motDePasse"
            placeholder="admin123"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-mdp"
            (click)="voirMdp = !voirMdp"
          >{{ voirMdp ? 'Masquer' : 'Voir' }}</button>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-login"
        [disabled]="loginForm.invalid"
      >
        Se connecter
      </button>
    </form>

    <p class="login-hint">Indice : admin / admin123</p>
  </div>
</main>

<main class="competences-page">
  <div class="container">
    <div class="page-header">
      <p class="section-eyebrow">Competences</p>
      <h1 class="section-title">Mes competences techniques</h1>
      <p class="section-sub">Liste simple basee sur les composants et le binding Angular.</p>
    </div>

    <div class="competences-grid">
      @for (competence of competences; track competence.id) {
        <article class="competence-card">
          <div class="competence-top">
            <h2>{{ competence.nom }}</h2>
            <span class="tag">{{ competence.categorie }}</span>
          </div>
          <div class="niveau">
            <div class="niveau-barre" [style.width.%]="competence.niveau"></div>
          </div>
          <p>{{ competence.niveau }}%</p>
        </article>
      }
    </div>
  </div>
</main>

<nav class="navbar" aria-label="Navigation principale">
  <div class="nav-container">
    <a class="nav-brand" routerLink="/accueil" (click)="fermerMenu()">
      <span class="brand-dot" aria-hidden="true"></span>
      <span>DevFolio</span>
    </a>

    <ul class="nav-links">
      <li>
        <a routerLink="/accueil" routerLinkActive="actif" [routerLinkActiveOptions]="{ exact: true }">Accueil</a>
      </li>
      <li>
        <a routerLink="/projets" routerLinkActive="actif">Projets</a>
      </li>
      <li>
        <a routerLink="/competences" routerLinkActive="actif">Competences</a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="actif">Contact</a>
      </li>

      @if (auth.estConnecte()) {
        <li>
          <a class="nav-admin" routerLink="/admin/projets" routerLinkActive="actif">Admin</a>
        </li>
        <li>
          <button class="btn-deconnexion" type="button" (click)="deconnecter()">Deconnexion</button>
        </li>
      } @else {
        <li>
          <a class="nav-cta btn btn-primary" routerLink="/login" routerLinkActive="actif">Login</a>
        </li>
      }
    </ul>

    <button
      class="burger"
      type="button"
      [class.ouvert]="menuOuvert"
      [attr.aria-expanded]="menuOuvert"
      aria-controls="mobile-menu"
      aria-label="Ouvrir le menu"
      (click)="basculerMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (menuOuvert) {
    <div class="mobile-menu" id="mobile-menu">
      <a routerLink="/accueil" routerLinkActive="actif" [routerLinkActiveOptions]="{ exact: true }" (click)="fermerMenu()">Accueil</a>
      <a routerLink="/projets" routerLinkActive="actif" (click)="fermerMenu()">Projets</a>
      <a routerLink="/competences" routerLinkActive="actif" (click)="fermerMenu()">Competences</a>
      <a routerLink="/contact" routerLinkActive="actif" (click)="fermerMenu()">Contact</a>

      @if (auth.estConnecte()) {
        <a class="nav-admin" routerLink="/admin/projets" routerLinkActive="actif" (click)="fermerMenu()">Admin</a>
        <button class="btn-deconnexion" type="button" (click)="deconnecter()">Deconnexion</button>
      } @else {
        <a class="mobile-login" routerLink="/login" routerLinkActive="actif" (click)="fermerMenu()">Login</a>
      }
    </div>
  }
</nav>
